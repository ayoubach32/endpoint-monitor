<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Endpoint Monitor{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'monitor/css/dashboard.css' %}?v=3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar">
    <span class="nav-brand">
      <span class="status-dot" id="status-dot"></span>
      Endpoint Monitor
    </span>
    <span class="nav-host" id="hostname">Loading...</span>
  </nav>
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'monitor/js/dashboard.js' %}"></script>
</body>
</html>
