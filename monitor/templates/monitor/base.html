<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Endpoint Monitor{% endblock %}</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'monitor/css/dashboard.css' %}?v=3">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <nav class="navbar">
  <div class="nav-left">
    {% load static %}
    <img src="{% static 'monitor/css/logo.png' %}" alt="Endpoint Monitor" class="nav-logo">
  </div>
  <div class="nav-right">
    <span class="status-dot" id="status-dot"></span>
    <span class="nav-status-text">live</span>
    <span class="nav-host" id="hostname">Loading...</span>
  </div>
</nav>
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>
  <script src="{% static 'monitor/js/dashboard.js' %}"></script>
</body>
</html>
